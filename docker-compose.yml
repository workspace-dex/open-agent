services:
  searxng:
    image: searxng/searxng:latest
    container_name: open-agent-searxng
    ports:
      - "8081:8080"
    environment:
      - BASE_URL=http://localhost:8081
      - INSTANCE_NAME=open-agent-search
    volumes:
      - searxng-data:/etc/searxng
    restart: unless-stopped

volumes:
  searxng-data:
